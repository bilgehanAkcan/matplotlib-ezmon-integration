name: Experiment with Ezmon

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  NO_AT_BRIDGE: 1
  OPENBLAS_NUM_THREADS: 1
  PYTHONFAULTHANDLER: 1

jobs:
  test:
    name: "${{ matrix.tool }} · py${{ matrix.python-version }}/${{ matrix.os }}"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
        os: [ubuntu-22.04]
        tool: [ezmon, testmon, vanilla]

    env:
      # Enable network only if the tool is ezmon
      TESTMON_NET_ENABLED: ${{ matrix.tool == 'ezmon' && 'true' || 'false' }}
      TESTMON_SERVER: "https://ezmon.aloiz.ch"
      REPO_ID: ${{ github.repository }}
      JOB_ID: "${{ matrix.os }}-py${{ matrix.python-version }}"

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install OS packages
        run: |
          echo 'Acquire::Retries "3";' | sudo tee /etc/apt/apt.conf.d/80-retries
          sudo apt-get update -yy
          sudo apt-get install -yy --no-install-recommends \
            ccache \
            cm-super \
            dvipng \
            fonts-freefont-otf \
            fonts-noto-cjk \
            fonts-wqy-zenhei \
            gir1.2-gtk-3.0 \
            gir1.2-gtk-4.0 \
            graphviz \
            inkscape \
            language-pack-de \
            libcairo2 \
            libcairo2-dev \
            libffi-dev \
            libgeos-dev \
            libnotify4 \
            libsdl2-2.0-0 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            lmodern \
            ninja-build \
            pkg-config \
            qtbase5-dev \
            texlive-fonts-recommended \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-latex-recommended \
            texlive-luatex \
            texlive-pictures \
            texlive-xetex \
            ffmpeg \
            poppler-utils \
            libgirepository1.0-dev

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ matrix.os }}-py${{ matrix.python-version }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ matrix.os }}-py${{ matrix.python-version }}-pip-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ matrix.os }}-py${{ matrix.python-version }}-ccache-${{ hashFiles('src/*') }}
          restore-keys: |
            ${{ matrix.os }}-py${{ matrix.python-version }}-ccache-

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel meson-python ninja pybind11 setuptools_scm certifi numpy pytest pytest-xdist pytest-timeout

      - name: Install GUI toolkits
        run: |
          python -m pip install --upgrade pycairo 'cairocffi>=0.8' 'PyGObject<3.52.0' || true
          python -m pip install --upgrade --only-binary :all: pyqt5 || true
          python -m pip install --upgrade --only-binary :all: pyqt6 || true
          python -m pip install --upgrade --only-binary :all: pyside6 || true
          python -m pip install --upgrade --only-binary :all: \
            -f "https://extras.wxpython.org/wxPython4/extras/linux/gtk3/${{ matrix.os }}" \
            wxPython || true

      - name: Install Matplotlib & Testing Dependencies
        run: |
          # This triggers the pyproject.toml build and installs all [dev] testing requirements
          python -m pip install --verbose --no-build-isolation \
            --config-settings=setup-args="-DrcParams-backend=Agg" \
            --editable ".[dev]"

      - name: Install test runner plugin
        run: |
          # Conditionally install the correct plugin based on the matrix
          if [ "${{ matrix.tool }}" == "ezmon" ]; then
            python -m pip install "git+https://github.com/andreas16700/pytest-testmon@main"
          elif [ "${{ matrix.tool }}" == "testmon" ]; then
            python -m pip install pytest-testmon
          fi

      - name: Cache testmon data
        if: matrix.tool == 'testmon'
        uses: actions/cache@v4
        with:
          path: .testmondata
          key: testmon-${{ matrix.os }}-py${{ matrix.python-version }}-${{ github.ref }}
          restore-keys: |
            testmon-${{ matrix.os }}-py${{ matrix.python-version }}-

      - name: Run test suite & calculate metrics
        env:
          EZMON_VERSIONING: "1"
        run: |
          # 1. Determine the correct pytest command
          if [ "${{ matrix.tool }}" == "ezmon" ]; then
            CMD="python -m pytest -p no:cov --ezmon -v"
          elif [ "${{ matrix.tool }}" == "testmon" ]; then
            CMD="python -m pytest -p no:cov --testmon -v"
          else
            # Vanilla: disable coverage and both plugins just in case they were installed via dev dependencies
            CMD="python -m pytest -p no:cov -p no:testmon -p no:ezmon -v"
          fi

          # 2. Run the tests
          start_time=$(python -c "import time; print(time.time())")
          $CMD || true
          end_time=$(python -c "import time; print(time.time())")

          # 3. Get Duration and DB Size
          duration=$(python -c "print(f'{float($end_time) - float($start_time):.4f}')")
          db_size=$(python -c "import os; print(os.path.getsize('.testmondata')) if os.path.exists('.testmondata') else print(0)")

          # 4. Log to GitHub Summary
          echo "### ${{ matrix.tool }} Tests (${{ matrix.os }} - py${{ matrix.python-version }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${duration} seconds" >> $GITHUB_STEP_SUMMARY
          echo "- **DB Size:** ${db_size} bytes" >> $GITHUB_STEP_SUMMARY
          
          # 5. Save everything to JSON
          echo "{\"os\": \"${{ matrix.os }}\", \"python\": \"${{ matrix.python-version }}\", \"tool\": \"${{ matrix.tool }}\", \"duration_seconds\": ${duration}, \"db_size_bytes\": ${db_size}}" > result-${{ matrix.os }}-py${{ matrix.python-version }}-${{ matrix.tool }}.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-result-${{ matrix.os }}-py${{ matrix.python-version }}-${{ matrix.tool }}
          path: result-*.json
